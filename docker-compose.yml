version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    networks:
      - solo100

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - solo100

networks:
  solo100:
    driver: bridge
